groups:
  - name: pensyarat_infrastructure_rules
    interval: 30s
    rules:
      # Database connection pool utilization
      - record: pensyarat:infra:db_pool_utilization
        expr: |
          (pensyarat_database_connections_active / pensyarat_db_connections_max) * 100

      # Redis memory utilization (when available)
      - record: pensyarat:infra:redis_memory_utilization
        expr: |
          (pensyarat_redis_memory_used_bytes / pensyarat_redis_memory_max_bytes) * 100

      # System health composite score (simplified)
      - record: pensyarat:infra:health_score
        expr: |
          avg(pensyarat_ai_quality_score) * 100