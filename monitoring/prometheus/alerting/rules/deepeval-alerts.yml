groups:
  - name: pensyarat_deepeval_alerts
    rules:
      # LLM Quality Alerts
      - alert: LLMQualityScoreLow
        expr: avg(pensyarat_llm_quality_score{metric="average"}) < 0.7
        for: 5m
        labels:
          severity: warning
          service: pensyarat
          component: llm_quality
        annotations:
          summary: "LLM quality score is below acceptable threshold"
          description: "Average LLM quality score is {{ $value | humanizePercentage }} which is below the 70% threshold for {{ $labels.instance }}"

      - alert: LLMQualityScoreCritical
        expr: avg(pensyarat_llm_quality_score{metric="average"}) < 0.5
        for: 2m
        labels:
          severity: critical
          service: pensyarat
          component: llm_quality
        annotations:
          summary: "LLM quality score is critically low"
          description: "Average LLM quality score is {{ $value | humanizePercentage }} which is critically low for {{ $labels.instance }}"

      # Category-specific Quality Alerts
      - alert: HallucinationRateHigh
        expr: pensyarat_llm_quality_score{category="hallucination",metric="average"} < 0.8
        for: 3m
        labels:
          severity: warning
          service: pensyarat
          component: llm_hallucination
        annotations:
          summary: "LLM hallucination rate is high"
          description: "Hallucination detection score is {{ $value | humanizePercentage }} for {{ $labels.instance }}"

      - alert: BiasDetectionFailure
        expr: pensyarat_llm_quality_score{category="bias",metric="average"} < 0.6
        for: 5m
        labels:
          severity: warning
          service: pensyarat
          component: llm_bias
        annotations:
          summary: "LLM bias detection score is low"
          description: "Bias detection score is {{ $value | humanizePercentage }} for {{ $labels.instance }}"

      - alert: ToxicityDetectionFailure
        expr: pensyarat_llm_quality_score{category="toxicity",metric="average"} < 0.7
        for: 3m
        labels:
          severity: critical
          service: pensyarat
          component: llm_toxicity
        annotations:
          summary: "LLM toxicity detection is failing"
          description: "Toxicity detection score is {{ $value | humanizePercentage }} for {{ $labels.instance }}"

      # Pass Rate Alerts
      - alert: LLMPassRateLow
        expr: avg(pensyarat_llm_quality_score{metric="pass_rate"}) < 0.8
        for: 5m
        labels:
          severity: warning
          service: pensyarat
          component: llm_quality
        annotations:
          summary: "LLM evaluation pass rate is low"
          description: "LLM evaluation pass rate is {{ $value | humanizePercentage }} which is below 80% for {{ $labels.instance }}"

      # System Health Alerts
      - alert: DeepEvalServiceDown
        expr: pensyarat_system_status{component="deepeval_service"} == 0
        for: 1m
        labels:
          severity: critical
          service: pensyarat
          component: deepeval_service
        annotations:
          summary: "DeepEval monitoring service is down"
          description: "DeepEval monitoring service is not responding for {{ $labels.instance }}"

      - alert: RedisConnectionFailure
        expr: pensyarat_system_status{component="redis_cache"} == 0
        for: 2m
        labels:
          severity: warning
          service: pensyarat
          component: redis_cache
        annotations:
          summary: "Redis cache connection failed"
          description: "Redis cache connection is down, affecting evaluation caching for {{ $labels.instance }}"

      # Performance Alerts
      - alert: LowEvaluationVolume
        expr: rate(pensyarat_llm_evaluations_total[5m]) < 0.01
        for: 10m
        labels:
          severity: warning
          service: pensyarat
          component: llm_monitoring
        annotations:
          summary: "Low LLM evaluation volume"
          description: "LLM evaluation rate is {{ $value }} evaluations/second, indicating low system activity for {{ $labels.instance }}"

      - alert: HighEvaluationVolume
        expr: rate(pensyarat_llm_evaluations_total[5m]) > 10
        for: 5m
        labels:
          severity: warning
          service: pensyarat
          component: llm_monitoring
        annotations:
          summary: "High LLM evaluation volume"
          description: "LLM evaluation rate is {{ $value }} evaluations/second, system may be under high load for {{ $labels.instance }}"

      # Data Freshness Alerts
      - alert: MetricsDataStale
        expr: (time() - pensyarat_last_update_timestamp/1000) > 300
        for: 2m
        labels:
          severity: warning
          service: pensyarat
          component: metrics_collection
        annotations:
          summary: "LLM quality metrics data is stale"
          description: "Metrics haven't been updated for {{ $value }} seconds for {{ $labels.instance }}"

  - name: pensyarat_deepeval_recording_rules
    interval: 30s
    rules:
      # Recording rules for better query performance
      - record: pensyarat:llm_quality_score:avg
        expr: avg(pensyarat_llm_quality_score{metric="average"})

      - record: pensyarat:llm_pass_rate:avg
        expr: avg(pensyarat_llm_quality_score{metric="pass_rate"})

      - record: pensyarat:evaluation_rate:5m
        expr: rate(pensyarat_llm_evaluations_total[5m])

      - record: pensyarat:quality_distribution:excellent
        expr: count(pensyarat_llm_quality_score{metric="average"} >= 0.9)

      - record: pensyarat:quality_distribution:good
        expr: count(pensyarat_llm_quality_score{metric="average"} >= 0.7 < 0.9)

      - record: pensyarat:quality_distribution:needs_improvement
        expr: count(pensyarat_llm_quality_score{metric="average"} < 0.7)

      # Category-specific aggregations
      - record: pensyarat:security_score:avg
        expr: avg(pensyarat_llm_quality_score{category=~"bias|toxicity|hallucination",metric="average"})

      - record: pensyarat:accuracy_score:avg
        expr: avg(pensyarat_llm_quality_score{category=~"relevancy|faithfulness|precision|recall",metric="average"})

      - record: pensyarat:performance_score:avg
        expr: avg(pensyarat_llm_quality_score{category="performance",metric="average"})
